<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Transport | 44T Full Breakdown Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDOPkYduNBvti4HWX2izIhCrrQ02uk5SL0&libraries=geometry,distance_matrix"></script>
    
    <style>
        :root { --frost-red: #c32026; --frost-grey: #1e293b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f1f5f9; }
        .frost-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .frost-input { height: 50px; border: 2px solid #e2e8f0; padding: 0 1rem; border-radius: 8px; width: 100%; font-size: 1rem; outline: none; }
        .label-text { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .btn-primary { background: var(--frost-red); color: white; font-weight: 900; text-transform: uppercase; padding: 1.25rem; border-radius: 8px; cursor: pointer; width: 100%; }
    </style>
</head>
<body class="p-10">

    <header class="max-w-[1200px] mx-auto mb-10 border-b-2 border-slate-200 pb-6">
        <h1 class="text-4xl font-black italic tracking-tighter text-slate-900">FROST <span class="text-red-600">TRANSPORT</span></h1>
        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mt-1">Detailed Time & Mileage Engine</p>
    </header>

    <main class="max-w-[1200px] mx-auto grid grid-cols-12 gap-10">
        
        <div class="col-span-7 space-y-8">
            <section class="frost-card">
                <h3 class="label-text text-red-600 text-lg mb-6 underline decoration-2">01. Route Calculation</h3>
                <div class="grid grid-cols-2 gap-6">
                    <input type="text" id="pickup" class="frost-input uppercase font-bold" placeholder="COLLECTION POSTCODE" onchange="calculate()">
                    <input type="text" id="delivery" class="frost-input uppercase font-bold" placeholder="DELIVERY POSTCODE" onchange="calculate()">
                </div>
                <div class="grid grid-cols-2 gap-6 mt-6">
                    <div class="p-4 bg-slate-50 rounded-lg">
                        <span class="label-text">Google Distance</span>
                        <div id="mileDisplay" class="text-2xl font-black italic text-slate-900">0 mi</div>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-lg">
                        <span class="label-text">Google Drive Time</span>
                        <div id="driveTimeDisplay" class="text-2xl font-black italic text-slate-900">0h 0m</div>
                    </div>
                </div>
                <div class="mt-4">
                    <span class="label-text">Manual Mileage Adjustment</span>
                    <input type="number" id="manualMiles" class="frost-input w-full" placeholder="Override miles if required" oninput="miles = parseFloat(this.value) || 0; update();">
                </div>
            </section>

            <section class="frost-card">
                <h3 class="label-text text-red-600 text-lg mb-6 underline decoration-2">02. On-Site Windows</h3>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <span class="label-text">Loading (Hrs)</span>
                        <input type="number" id="loadHrs" value="2" step="0.5" class="frost-input" oninput="update()">
                    </div>
                    <div>
                        <span class="label-text">Tipping (Hrs)</span>
                        <input type="number" id="tipHrs" value="2" step="0.5" class="frost-input" oninput="update()">
                    </div>
                </div>
            </section>
        </div>

        <div class="col-span-5">
            <div class="bg-slate-900 text-white p-8 rounded-2xl shadow-2xl sticky top-10 border-b-8 border-red-600">
                <h2 class="text-xl font-black italic uppercase text-red-500 mb-8">Detailed Breakdown</h2>

                <div id="breakdown" class="space-y-4 mb-10">
                    </div>

                <div class="border-t border-slate-700 pt-8">
                    <span class="label-text text-slate-400">Total Quote (Ex VAT)</span>
                    <div id="totalDisp" class="text-6xl font-black italic tracking-tighter text-white mt-2">£0.00</div>
                    <p class="text-[10px] text-slate-500 mt-2 font-bold uppercase">Base Costs + 25% Margin</p>
                </div>

                <button class="btn-primary mt-10" onclick="alert('Confirmed')">Confirm Quote</button>
            </div>
        </div>
    </main>

    <script>
        const RATE_STAND_HOUR = 39.20;
        const RATE_DRIVER_HOUR = 22.04;
        const RATE_FUEL_MILE   = 0.71; 
        const PROFIT_MARGIN    = 1.25;

        const HOURLY_TOTAL = RATE_STAND_HOUR + RATE_DRIVER_HOUR; // £61.24 combined

        let miles = 0;
        let driveMinutes = 0;

        function calculate() {
            const p = document.getElementById('pickup').value;
            const d = document.getElementById('delivery').value;

            if (p.length > 2 && d.length > 2) {
                const service = new google.maps.DistanceMatrixService();
                service.getDistanceMatrix({
                    origins: [p],
                    destinations: [d],
                    travelMode: 'DRIVING',
                    unitSystem: google.maps.UnitSystem.IMPERIAL
                }, (response, status) => {
                    if (status === 'OK' && response.rows[0].elements[0].status === 'OK') {
                        const data = response.rows[0].elements[0];
                        miles = Math.round((data.distance.value * 0.000621371) * 1.05);
                        driveMinutes = Math.round(data.duration.value / 60);
                        
                        document.getElementById('mileDisplay').innerText = miles + " mi";
                        document.getElementById('driveTimeDisplay').innerText = Math.floor(driveMinutes/60) + "h " + (driveMinutes%60) + "m";
                        document.getElementById('manualMiles').value = miles;
                        update();
                    }
                });
            }
        }

        function update() {
            const lTime = parseFloat(document.getElementById('loadHrs').value) || 0;
            const tTime = parseFloat(document.getElementById('tipHrs').value) || 0;
            const onSiteTime = lTime + tTime;
            const driveHrs = driveMinutes / 60;

            const driveCost = driveHrs * HOURLY_TOTAL;
            const onSiteCost = onSiteTime * HOURLY_TOTAL;
            const fuelCost = miles * RATE_FUEL_MILE;

            const netTotal = driveCost + onSiteCost + fuelCost;
            const finalTotal = netTotal * PROFIT_MARGIN;

            const items = [
                { label: `Driving Time (${driveHrs.toFixed(2)}h)`, val: driveCost },
                { label: `On-Site Time (${onSiteTime.toFixed(2)}h)`, val: onSiteCost },
                { label: `Mileage Fuel (${miles}mi @ £0.71)`, val: fuelCost },
                { label: "Net Operational Cost", val: netTotal, highlight: true },
                { label: "Margin (25%)", val: (finalTotal - netTotal) }
            ];

            document.getElementById('breakdown').innerHTML = items.map(i => `
                <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                    <span class="text-[10px] font-bold ${i.highlight ? 'text-white' : 'text-slate-500'} uppercase">${i.label}</span>
                    <span class="font-mono text-sm ${i.highlight ? 'text-red-500 font-black' : 'text-slate-200'}">£${i.val.toFixed(2)}</span>
                </div>
            `).join('');

            document.getElementById('totalDisp').innerText = '£' + finalTotal.toFixed(2);
        }
    </script>
</body>
</html>
