<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Transport | 44T Dynamic Cost Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDOPkYduNBvti4HWX2izIhCrrQ02uk5SL0&libraries=geometry,distance_matrix"></script>
    
    <style>
        :root { --frost-red: #c32026; --frost-grey: #1e293b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f1f5f9; }
        .frost-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .frost-input { height: 50px; border: 2px solid #e2e8f0; padding: 0 1rem; border-radius: 8px; width: 100%; font-size: 1rem; outline: none; }
        .label-text { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.025em;}
        .btn-primary { background: var(--frost-red); color: white; font-weight: 900; text-transform: uppercase; padding: 1.25rem; border-radius: 8px; cursor: pointer; width: 100%; }
        
        /* Slider Styling */
        .fuel-slider { -webkit-appearance: none; width: 100%; height: 8px; background: #334155; border-radius: 5px; outline: none; }
        .fuel-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; background: #c32026; cursor: pointer; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body class="p-10">

    <header class="max-w-[1200px] mx-auto mb-10 border-b-2 border-slate-200 pb-6 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-slate-900">FROST <span class="text-red-600">TRANSPORT</span></h1>
            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mt-1">HGV Cost-Plus Engine v3.0</p>
        </div>
        <div class="text-right font-black text-red-600 italic">44T ARTIC OPERATIONS</div>
    </header>

    <main class="max-w-[1200px] mx-auto grid grid-cols-12 gap-10">
        
        <div class="col-span-7 space-y-8">
            <section class="frost-card">
                <h3 class="label-text text-red-600 text-lg mb-6 underline decoration-2">01. Journey Metrics</h3>
                <div class="grid grid-cols-2 gap-6">
                    <input type="text" id="pickup" class="frost-input uppercase font-bold" placeholder="COLLECTION POSTCODE" onchange="calculate()">
                    <input type="text" id="delivery" class="frost-input uppercase font-bold" placeholder="DELIVERY POSTCODE" onchange="calculate()">
                </div>
                <div class="grid grid-cols-2 gap-6 mt-6">
                    <div class="p-4 bg-slate-50 rounded-lg text-center">
                        <span class="label-text">Google Distance</span>
                        <div id="mileDisplay" class="text-2xl font-black italic text-slate-900">0 mi</div>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-lg text-center">
                        <span class="label-text">Google Drive Time</span>
                        <div id="driveTimeDisplay" class="text-2xl font-black italic text-slate-900">0h 0m</div>
                    </div>
                </div>
                <div class="mt-4">
                    <span class="label-text">Manual Mileage Adjustment</span>
                    <input type="number" id="manualMiles" class="frost-input w-full" placeholder="Override miles" oninput="miles = parseFloat(this.value) || 0; update();">
                </div>
            </section>

            <section class="frost-card">
                <h3 class="label-text text-red-600 text-lg mb-6 underline decoration-2">02. Site Windows</h3>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <span class="label-text">Loading (Hrs)</span>
                        <input type="number" id="loadHrs" value="2" step="0.5" class="frost-input" oninput="update()">
                    </div>
                    <div>
                        <span class="label-text">Tipping (Hrs)</span>
                        <input type="number" id="tipHrs" value="2" step="0.5" class="frost-input" oninput="update()">
                    </div>
                </div>
            </section>
        </div>

        <div class="col-span-5">
            <div class="bg-slate-900 text-white p-8 rounded-2xl shadow-2xl sticky top-10 border-b-8 border-red-600">
                
                <div class="space-y-6 mb-8 border-b border-slate-700 pb-8">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="label-text text-slate-400">Profit Margin</span>
                            <select id="marginSelect" onchange="update()" class="bg-slate-800 border border-slate-600 text-white text-xs p-1 rounded font-bold">
                                <option value="1.25" selected>25%</option>
                                <option value="1.20">20%</option>
                                <option value="1.15">15%</option>
                                <option value="1.10">10%</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="label-text text-slate-400">Fuel Rate (Per Mile)</span>
                            <span id="fuelValDisplay" class="text-red-500 font-black italic text-sm">£0.71</span>
                        </div>
                        <input type="range" id="fuelSlider" min="0.50" max="1.50" step="0.01" value="0.71" class="fuel-slider" oninput="update()">
                    </div>
                </div>

                <div id="breakdown" class="space-y-4 mb-10 text-sm">
                    <div class="text-slate-500 italic text-xs text-center py-4">Waiting for route data...</div>
                </div>

                <div class="border-t border-slate-700 pt-8 text-center">
                    <span class="label-text text-slate-400">Total Quote (Ex VAT)</span>
                    <div id="totalDisp" class="text-6xl font-black italic tracking-tighter text-white mt-2">£0.00</div>
                </div>

                <button class="btn-primary mt-10" onclick="alert('Quote Logged')">Finalize Quote</button>
            </div>
        </div>
    </main>

    <script>
        // HOURLY RATES ARE FIXED
        const RATE_STAND_HOUR = 39.20;
        const RATE_DRIVER_HOUR = 22.04;
        const HOURLY_TOTAL = RATE_STAND_HOUR + RATE_DRIVER_HOUR; // £61.24

        let miles = 0;
        let driveMinutes = 0;

        function calculate() {
            const p = document.getElementById('pickup').value;
            const d = document.getElementById('delivery').value;

            if (p.length > 2 && d.length > 2) {
                const service = new google.maps.DistanceMatrixService();
                service.getDistanceMatrix({
                    origins: [p],
                    destinations: [d],
                    travelMode: 'DRIVING',
                    unitSystem: google.maps.UnitSystem.IMPERIAL
                }, (response, status) => {
                    if (status === 'OK' && response.rows[0].elements[0].status === 'OK') {
                        const data = response.rows[0].elements[0];
                        miles = Math.round((data.distance.value * 0.000621371) * 1.05);
                        driveMinutes = Math.round(data.duration.value / 60);
                        
                        document.getElementById('mileDisplay').innerText = miles + " mi";
                        document.getElementById('driveTimeDisplay').innerText = Math.floor(driveMinutes/60) + "h " + (driveMinutes%60) + "m";
                        document.getElementById('manualMiles').value = miles;
                        update();
                    }
                });
            }
        }

        function update() {
            // Get slider and dropdown values
            const fuelRate = parseFloat(document.getElementById('fuelSlider').value);
            const marginMultiplier = parseFloat(document.getElementById('marginSelect').value);
            
            // Update the text display for the fuel slider
            document.getElementById('fuelValDisplay').innerText = '£' + fuelRate.toFixed(2);

            const lTime = parseFloat(document.getElementById('loadHrs').value) || 0;
            const tTime = parseFloat(document.getElementById('tipHrs').value) || 0;
            const driveHrs = driveMinutes / 60;

            const timeCost = (driveHrs + lTime + tTime) * HOURLY_TOTAL;
            const fuelCost = miles * fuelRate;
            const netTotal = timeCost + fuelCost;
            const finalTotal = netTotal * marginMultiplier;

            const items = [
                { label: `Combined Time (${(driveHrs + lTime + tTime).toFixed(2)}h)`, val: timeCost },
                { label: `Fuel Cost (${miles}mi @ £${fuelRate.toFixed(2)})`, val: fuelCost },
                { label: "Net Operational Cost", val: netTotal, highlight: true },
                { label: `Profit Margin (${((marginMultiplier-1)*100).toFixed(0)}%)`, val: (finalTotal - netTotal) }
            ];

            document.getElementById('breakdown').innerHTML = items.map(i => `
                <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                    <span class="text-[10px] font-bold ${i.highlight ? 'text-white' : 'text-slate-500'} uppercase">${i.label}</span>
                    <span class="font-mono text-sm ${i.highlight ? 'text-red-500 font-black' : 'text-slate-200'}">£${i.val.toFixed(2)}</span>
                </div>
            `).join('');

            document.getElementById('totalDisp').innerText = '£' + finalTotal.toFixed(2);
        }
    </script>
</body>
</html>
